spring.application.name=matrimony-backend
server.port=8080

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:matrimonydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT Configuration
app.jwt.secret=matrimony-super-secret-key-that-is-long-enough-for-hs512-algorithm-2024
app.jwt.expiration-ms=86400000

# CORS
app.cors.allowed-origins=http://localhost:3000

# File upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
